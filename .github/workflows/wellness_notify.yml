name: 养生计划每日推送

on:
  schedule:
    # 所有时间为 UTC，北京时间 = UTC+8
    - cron: '30 23 * * *'  # 07:30 CST
    - cron: '45 23 * * *'  # 07:45 CST
    - cron: '30 0 * * *'   # 08:30 CST
    - cron: '30 2 * * *'   # 10:30 CST
    - cron: '0 4 * * *'    # 12:00 CST
    - cron: '30 4 * * *'   # 12:30 CST
    - cron: '30 6 * * *'   # 14:30 CST
    - cron: '30 8 * * *'   # 16:30 CST
    - cron: '30 10 * * *'  # 18:30 CST
    - cron: '30 11 * * *'  # 19:30 CST
    - cron: '0 13 * * *'   # 21:00 CST
    - cron: '30 14 * * *'  # 22:30 CST
  workflow_dispatch:        # 允许手动触发（用来测试）

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送 Bark 推送
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          python3 - << 'EOF'
          import os, requests, datetime

          # 北京时间 (UTC+8)
          now = datetime.datetime.utcnow() + datetime.timedelta(hours=8)

          NOTIFICATIONS = {
              "07:30": ("☀️ 早安，起床啦～",
                        "先别看手机！床头那杯水喝掉，600ml，喝完再刷。空腹喝温水能启动肠胃、排毒、控油，比任何护肤品都便宜。今天也是皮肤变好的一天💧"),
              "07:45": ("🥐 出门前吃点东西",
                        "不吃早餐→血糖崩→午饭暴食→下午犯困→皮肤变差，这个链条你经历过多少次了？楼下便利店：茶叶蛋1个+三明治，5分钟搞定，今天的代谢从这里开始。"),
              "08:30": ("🚶 提前一站下车！",
                        "现在就准备下车，走路去公司。15分钟步行=今天的运动量完成✅ 不用健身房，不用额外时间。走路时挺胸收腹，练姿势的同时顺便燃脂，一举两得。"),
              "10:30": ("💧 离开座位30秒",
                        "已经坐了2小时了。站起来，走到茶水间，接600ml水喝掉。顺手做个肩颈绕圈，左右各5次。久坐会让血液循环变差，直接影响脸色——起来动一下，比涂口红还提气色。"),
              "12:00": ("🥗 午饭时间，今天吃聪明点",
                        "外卖备注写上：少油少辣，多加蔬菜。选择顺序：蒸菜>炒菜>油炸。深色蔬菜（菠菜/西兰花/胡萝卜）含抗氧化成分，直接护肤。今天蔬菜达标了，皮肤会悄悄记账的🌿"),
              "12:30": ("🚶 饭后不要坐着",
                        "吃完饭立刻坐着=血糖飙升+消化变慢+下午犯困。出去走10分钟，哪怕就在楼道里转，也能让血糖稳住、消化提速。走完回来，下午精力比同事强一截。"),
              "14:30": ("🍵 下午补水时间",
                        "现在感觉有点困？不是因为累，是因为缺水。喝400ml水或无糖绿茶（绿茶里的EGCG是护肤成分，比很多精华便宜100倍）。奶茶今天先放放，给皮肤一个机会🍃"),
              "16:30": ("🧍 肩颈快要断了吧",
                        "对着屏幕盯了一下午，现在做：双手交叉放脑后，头缓缓向后仰，停5秒。然后左耳贴左肩，右耳贴右肩，各停5秒。就这几个动作，预防颈椎病，顺便让下班后不那么疲惫。"),
              "18:30": ("🏃 下班了！再走一段",
                        "提前一站下车，走路回家。今天上班路走过了，现在这段是加成——两段加起来30分钟，正好达到每日运动量。走路时深呼吸，把白天的压力呼出去，到家的时候整个人会轻松很多。"),
              "19:30": ("🍜 晚饭吃轻一点",
                        "今天辣的吃够了吗？晚上试试：砂锅粥+小菜，或者蒸菜套餐，或者清汤面。清淡的晚饭让肠胃休息，睡眠质量提升，明天早上起来脸不浮肿。你会发现皮肤状态和前一天晚饭直接挂钩🌾"),
              "21:00": ("✨ 护肤3步，今天做了吗",
                        "第1步：温水洗脸（35度，别用热水，热水破坏皮肤屏障）\n第2步：爽肤水轻拍到吸收\n第3步：保湿乳/霜锁水\n总共5分钟。今天的护肤做完，明天起来脸会比不做的人细腻一个档次。坚持30天会有人问你用了什么产品✨"),
              "22:30": ("🌙 该放下手机了",
                        "皮肤在23:00-02:00修复最活跃，这是真的，不是哄你睡觉。现在放下手机，调暗灯光，给自己10分钟缓冲。你今天喝水了、走路了、护肤了——已经比昨天的自己好了一点点。晚安🌙"),
          }

          bark_key = os.environ.get("BARK_KEY", "")
          if not bark_key:
              print("错误：BARK_KEY 未配置")
              exit(1)

          # 手动触发时发测试通知
          import sys
          is_manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"

          if is_manual:
              title = "🌱 推送测试"
              body = "收到这条说明通知正常！每天12条提醒已就位，从明早7:30开始准时到达～"
              resp = requests.post("https://api.day.app/push", json={
                  "title": title, "body": body,
                  "device_key": bark_key, "group": "养生计划", "sound": "birdsong",
              }, timeout=15)
              print(f"测试推送成功 HTTP {resp.status_code}")
              resp.raise_for_status()
              exit(0)

          # 匹配当前时间（允许 ±3 分钟误差）
          title, body = None, None
          cur_min = now.hour * 60 + now.minute
          for t, (ttl, bdy) in NOTIFICATIONS.items():
              h, m = map(int, t.split(":"))
              if abs(cur_min - h * 60 - m) <= 3:
                  title, body = ttl, bdy
                  break

          cst = f"{now.hour:02d}:{now.minute:02d}"
          if not title:
              print(f"当前时间 {cst} CST 无推送任务")
              exit(0)

          resp = requests.post("https://api.day.app/push", json={
              "title":      title,
              "body":       body,
              "device_key": bark_key,
              "group":      "养生计划",
              "sound":      "birdsong",
          }, timeout=15)

          print(f"[{cst} CST] 推送成功：{title}  HTTP {resp.status_code}")
          resp.raise_for_status()
          EOF
